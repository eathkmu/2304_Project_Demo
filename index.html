<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Phone Mockup</title>
    <style>
        :root {
            /* Adjust these to scale the whole phone */
            --phone-width: 300px;
            --phone-height: 600px;
            --frame-thickness: 12px;
            --frame-color: #1a1a1a;
            
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        /* The container that holds everything */
        #phone-outer-frame {
            position: relative;
            width: var(--phone-width);
            height: var(--phone-height);
        }

        /* The main device body */
        #phone {
            width: 100%;
            height: 100%;
            background: white;
            border: var(--frame-thickness) solid var(--frame-color);
            border-radius: 40px;
            box-sizing: border-box;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            position: relative;
            z-index: 2;
            overflow: hidden;
        }

        /* Common styles for all side buttons */
        .phone-key {
            /* Standard button offset - how much it protrudes */
            --btn-protrusion: -10px;
            --btn-width: 6px;
            position: absolute;
            background: var(--frame-color);
            width: var(--btn-width);
            z-index: 1; /* Sits behind the frame for a seamless look */
            transition: transform 0.1s ease;
            cursor: pointer;
        }

        /* Position buttons relative to phone height (%) */
        .vol-up {
            left: var(--btn-protrusion);
            top: 15%; 
            height: 40px;
            border-radius: 4px 0 0 4px;
        }

        .vol-down {
            left: var(--btn-protrusion);
            top: 23%;
            height: 40px;
            border-radius: 4px 0 0 4px;
        }

        .power {
            right: var(--btn-protrusion);
            top: 20%;
            height: 70px;
            border-radius: 0 4px 4px 0;
        }

        /* Simple click effect */
        .phone-key:active {
            transform: translateX(calc(var(--btn-protrusion) * -0.5));
        }

        /* Placeholder for screen content */
        .screen-content {
            padding: 20px;
            text-align: center;
            color: #333;
        }
    </style>
</head>
<body>

    <div id="phone-outer-frame">
        <!-- Physical Buttons -->
        <div class="phone-key vol-up"></div>
        <div class="phone-key vol-down"></div>
        <div class="phone-key power"></div>
        
        <!-- Device Body -->
        <div id="phone">
            <div class="screen-content">
                <h3>Smartphone UI</h3>
                <p>Buttons are relative to frame size.</p>
            </div>
        </div>
    </div>

</body>
</html>
