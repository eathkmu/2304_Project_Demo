<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        :root {
            --phone-width: 300px;
            --phone-height: 600px;
            --frame-color: #1a1a1a;
        }

        /* --- Default (Desktop Layout) --- */
        body {
            margin: 0;
            display: grid;
            /* Desktop: 300px sidebar, then the rest for the phone */
            grid-template-columns: 300px 1fr;
            grid-template-rows: auto 1fr;
            /* Define the map: Phone (c) spans two rows high */
            grid-template-areas:
                "a c"
                "b c";
            height: 100vh;
            font-family: sans-serif;
        }

        .sidebar {
            background: #fff;
            border-right: 1px solid #ddd;
            padding: 20px;
            overflow-y: auto;
            /* Scrollable if many controls */
        }

        #sidebar-top {
            grid-area: a;
            border-bottom: 1px solid #ddd;
        }

        #sidebar-bottom {
            grid-area: b;
        }

        .phone-stage {
            grid-area: c;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #e5e7eb;
        }

        /* --- Mobile / Narrow Screen Layout --- */
        @media (max-width: 768px) {
            body {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto;
                /* Re-map for mobile stacking: a -> c -> b */
                grid-template-areas:
                    "a"
                    "c"
                    "b";
                height: auto;
            }

            .sidebar {
                border-right: none;
                width: 100%;
            }

            .phone-stage {
                padding: 50px 0;
                min-height: 650px;
            }
        }



        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-size: 12px;
            font-weight: bold;
            color: #666;
            text-transform: uppercase;
        }

        /* Main area where the phone sits */
        .phone-stage {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #e5e7eb;
            /* Slightly darker to make phone pop */
        }

        /* --- Your existing Phone CSS --- */
        #phone-outer-frame {
            position: relative;
            width: var(--phone-width);
            height: var(--phone-height);
        }

        #phone {
            width: 100%;
            height: 100%;
            background: white;
            border: 12px solid var(--frame-color);
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            transition: filter 0.3s ease;
            /* For brightness simulation */
        }

        .phone-key {
            --phone-key-offset: -10px;
            position: absolute;
            background: var(--frame-color);
            width: 6px;
            z-index: 1;
        }

        #vol-up {
            left: var(--phone-key-offset);
            top: 15%;
            height: 40px;
            border-radius: 4px 0 0 4px;
        }

        #vol-down {
            left: var(--phone-key-offset);
            top: 23%;
            height: 40px;
            border-radius: 4px 0 0 4px;
        }

        #power-btn {
            right: var(--phone-key-offset);
            top: 20%;
            height: 70px;
            border-radius: 0 4px 4px 0;
        }
    </style>

    <style>
        @keyframes walking {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            25% {
                transform: translateY(-5px) rotate(1deg);
            }

            75% {
                transform: translateY(5px) rotate(-1deg);
            }
        }

        .is-walking {
            animation: walking 0.6s infinite ease-in-out;
        }
    </style>

    <script>
        function toggleWalking() {
            const frame = document.getElementById('phone-outer-frame');
            frame.classList.toggle('is-walking');
        }
    </script>

</head>

<body>

    <!-- Environment Controls -->
    <aside class="sidebar" id="sidebar-top">
        <h3>Environment</h3>

        <div class="control-group">
            <label>Ambient Brightness</label>
            <input type="range" min="20" max="100" value="100"
                oninput="document.getElementById('phone').style.filter = `brightness(${this.value}%)` ">
        </div>

        <div class="control-group">
            <label>Room Light Color</label>
            <input type="color" value="#e5e7eb"
                oninput="document.querySelector('.phone-stage').style.backgroundColor = this.value">
        </div>

        <div class="control-group">
            <label>Notification Trigger</label>
            <button onclick="document.getElementById('notification-box').style.display='flex'">Simulate Alert</button>
        </div>

    </aside>
    <aside class="sidebar" id="sidebar-bottom">
        <h3>Human action</h3>

        <div class="control-group">
            <label>Eyesight distance</label>
            <!-- Scaling from 0.5 (far) to 1.2 (close) -->
            <input type="range" min="5" max="12" value="10"
                oninput="document.getElementById('phone-outer-frame').style.transform = `scale(${this.value/10})` ">
        </div>

        <div class="control-group">
            <label>Walking Simulation</label>
            <button onclick="toggleWalking()">Toggle Movement</button>
        </div>
    </aside>


    <!-- Phone Stage -->
    <main class="phone-stage">
        <div id="phone-outer-frame">
            <div id="vol-up" class="phone-key"></div>
            <div id="vol-down" class="phone-key"></div>
            <div id="power-btn" class="phone-key"></div>

            <div id="phone">
                <div id="notification-box"
                    style="display:none; position:absolute; top:10px; left:10px; right:10px; height:50px; background:rgba(0,0,0,0.8); color:white; border-radius:10px; align-items:center; justify-content:center; z-index:10;">
                    New Notification
                </div>
                <div style="padding:40px; text-align:center;">
                    <p>Screen Content</p>
                </div>
            </div>
        </div>
    </main>

</body>

</html>
