<head>
    <!-- Standard Meta Tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My PWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#fdbf74">


    <!-- 1. SVG Favicon (Modern Browsers) -->
    <!-- Scalable and supports Dark Mode if your SVG uses CSS media queries -->
    <!-- <link rel="icon" type="image/svg+xml" href="icons/favicon.svg"> -->

    <!-- 2. PNG Favicons (Standard & High Resolution) -->
    <!-- 32x32 is the best general size for desktop tabs and pinned tabs -->
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
    <!-- <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png"> -->

    <!-- 3. Legacy Fallback (Internet Explorer 10 and below) -->
    <!-- Just place a file named "favicon.ico" in your root directory. 
         Most browsers will find it automatically even without this tag. -->
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
