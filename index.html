<head>
    <!-- Standard Meta Tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My PWA</title>

    <!-- Modern browsers will try this first -->
    <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">

    <!-- Fallback if the above fails -->
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <link rel="manifest" href="manifest.json">

    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }


        .rounded-box {
            /* 1. Shrink the div to fit the image exactly */
            display: inline-block;
            width: auto;
            height: auto;

            /* 2. Styling */
            border: 10px solid black;
            border-radius: 50px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .rounded-box img {
            /* 3. Let the image define the size */
            display: block;
            height: auto;
            width: auto;

            /* 4. The "Safety Rail": keep it from overflowing the screen */
            max-width: calc(100vw - 80px);
            /* Subtracts div border/padding/margins */
            max-height: calc(100vh - 80px);

            /* border-radius: 50px; */
            /* Optional: rounds the image corners too */
        }
    </style>

</head>

<body>
    <div /*id="phone-frame" */ class="rounded-box">
        <img id="introduction" src="./introduction/points-leaderboard.jpeg" alt="">
    </div>

    <script>
        const imageFolder = 'introduction/';
        const imageFiles = [
            "character.jpeg",
            "gift-page.jpeg",
            "points-leaderboard.jpeg",
            "points-rewards.jpeg",
            "profile.jpeg",
            "screentime-report.jpeg",
            "spine-exercises.jpeg",
            "step-counter.jpeg"
        ]
        const imgIntroduction = document.getElementById('introduction');
        
        let counter =0;
        let length =imageFiles.length;

        imgIntroduction.addEventListener('click', function () {
            imgIntroduction.src =imageFolder+imageFiles[counter];
            counter++;
            if(counter>=length){
                counter=0;
            }
        });

    </script>
</body>
